apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: nizamuddin1n/api-gateway:latest
          imagePullPolicy: Always
          env:
            - name: AUTH_SERVICE
              value: "http://auth-service:4001"
            - name: USER_SERVICE
              value: "http://user-service:4002"
            - name: RESTAURANT_SERVICE
              value: "http://restaurant-service:4003"
            - name: ORDER_SERVICE
              value: "http://order-service:4004"
            - name: PAYMENT_SERVICE
              value: "http://payment-service:4005"
          ports:
            - containerPort: 4000
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
spec:
  type: NodePort
  selector:
    app: api-gateway
  ports:
    - port: 4000
      targetPort: 4000
      nodePort: 30007