apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user-service
          image: nizamuddin1n/user-service:latest
          imagePullPolicy: Always
          env:
            - name: DB_HOST
              value: "postgres"
            - name: DB_PORT
              value: "5432"
            - name: DB_USER
              value: "postgres"
            - name: DB_PASSWORD
              value: "Nizamuddin@513"
            - name: DB_NAME
              value: "postgres"
            - name: JWT_ACCESS_SECRET
              value: "897o867i5eursxcgvghiji0i43q4a"
          ports:
            - containerPort: 4002
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
spec:
  selector:
    app: user-service
  ports:
    - port: 4002
      targetPort: 4002